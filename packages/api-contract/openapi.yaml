openapi: 3.0.3
info:
  title: Warfarin INR Assistant API
  version: 0.1.0
  description: |
    MVP API contract for medication logging, INR monitoring, settings and home summary.
    This product records and reminds only; it does not provide medical dosage advice.
servers:
  - url: http://127.0.0.1:8080/api/v1
paths:
  /home/summary:
    get:
      summary: Home summary
      responses:
        '200':
          description: Latest INR, next test time, reminder and medication state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeSummaryEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /medication/records:
    post:
      summary: Create medication action record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicationRecordRequest'
      responses:
        '200':
          description: Created medication record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicationRecordEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /inr/records:
    get:
      summary: List INR records
      responses:
        '200':
          description: INR records sorted by testedAt descending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/INRRecordListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create INR record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateINRRecordRequest'
      responses:
        '200':
          description: Created INR record with raw, corrected, trend and tier fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/INRRecordEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /settings:
    get:
      summary: Get user settings
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserSettingsRequest'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  responses:
    BadRequest:
      description: Validation or parsing error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    BaseEnvelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
    ErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            code:
              type: integer
              example: 400
            message:
              type: string
              example: time must be RFC3339
    HomeSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/HomeSummary'
    MedicationRecordEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/MedicationRecord'
    INRRecordEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/INRRecord'
    INRRecordListEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/INRRecordsResponse'
    INRRecordsResponse:
      type: object
      required: [records, trend, targetRange, displayText]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/INRRecord'
        trend:
          type: array
          description: Chronological points for the raw/corrected dual-line trend chart.
          items:
            $ref: '#/components/schemas/INRTrendPoint'
        targetRange:
          $ref: '#/components/schemas/TargetRange'
        displayText:
          $ref: '#/components/schemas/INRRecordsDisplayText'
    INRTrendPoint:
      type: object
      required: [date, rawValue, correctedValue]
      properties:
        date:
          type: string
          example: '04/23'
        rawValue:
          type: number
        correctedValue:
          type: number
    TargetRange:
      type: object
      required: [min, max]
      properties:
        min:
          type: number
          example: 1.8
        max:
          type: number
          example: 2.5
    UserSettingsEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/UserSettings'
    Reminder:
      type: object
      required: [level, title, body]
      properties:
        level:
          type: string
          enum: [normal, weak, strong]
        title:
          type: string
        body:
          type: string
    TodayMedication:
      type: object
      required: [status, plannedDoseTablets]
      properties:
        status:
          type: string
          enum: [pending, taken, paused, missed]
        plannedDoseTablets:
          type: number
    HomeSummary:
      type: object
      required: [prominentReminder, latestInr, nextTestAt, todayMedication, displayText]
      properties:
        prominentReminder:
          $ref: '#/components/schemas/Reminder'
        latestInr:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/INRRecord'
        nextTestAt:
          type: string
          format: date-time
        todayMedication:
          $ref: '#/components/schemas/TodayMedication'
        displayText:
          $ref: '#/components/schemas/HomeSummaryDisplayText'
    CreateMedicationRecordRequest:
      type: object
      required: [actionType, actualDoseTablets, tomorrowDoseMode]
      properties:
        actionType:
          type: string
          enum: [taken, paused, missed]
        actualDoseTablets:
          type: number
        tomorrowDoseMode:
          type: string
          enum: [planned, manual]
        tomorrowDoseTablets:
          type: number
          nullable: true
          description: Required by clients when tomorrowDoseMode is manual.
    MedicationRecord:
      type: object
      required: [id, actionType, actualDoseTablets, recordedAt, tomorrowDoseMode]
      properties:
        id:
          type: string
          example: med-1
        actionType:
          type: string
          enum: [taken, paused, missed]
        actualDoseTablets:
          type: number
        recordedAt:
          type: string
          format: date-time
        tomorrowDoseMode:
          type: string
          enum: [planned, manual]
        tomorrowDoseTablets:
          type: number
          nullable: true
    CreateINRRecordRequest:
      type: object
      required: [rawValue, testMethod, testedAt]
      properties:
        rawValue:
          type: number
          exclusiveMinimum: true
          minimum: 0
        offset:
          type: number
          nullable: true
          description: Optional correction offset. Defaults to settings.inrOffset when omitted.
        testMethod:
          type: string
          enum: [hospital_lab, poct_device, home_device, other]
        testedAt:
          type: string
          format: date-time
    INRRecord:
      type: object
      required: [id, rawValue, offsetValue, correctedValue, trend, abnormalTier, testMethod, testedAt, displayText]
      properties:
        id:
          type: string
          example: inr-1
        rawValue:
          type: number
        offsetValue:
          type: number
          description: Applied correction offset snapshot. It is preserved per record so historical INR values do not change when settings change.
        correctedValue:
          type: number
          description: rawValue plus either request offset or settings.inrOffset.
        trend:
          type: string
          enum: [low, in_range, high]
          description: Directional placement of correctedValue against the configured target range.
        abnormalTier:
          type: string
          enum: [normal, weak_low, weak_high, strong_low, strong_high]
          description: Risk tier using the configured target range and a 0.1 weak band.
        testMethod:
          type: string
          enum: [hospital_lab, poct_device, home_device, other]
        testedAt:
          type: string
          format: date-time
        displayText:
          $ref: '#/components/schemas/INRRecordDisplayText'
    HomeSummaryDisplayText:
      type: object
      required: [locale, latestInr, nextTest, todayMedication]
      properties:
        locale:
          type: string
          example: zh-CN
        latestInr:
          $ref: '#/components/schemas/LatestINRDisplayText'
        nextTest:
          $ref: '#/components/schemas/NextTestDisplayText'
        todayMedication:
          $ref: '#/components/schemas/TodayMedicationDisplayText'
    LatestINRDisplayText:
      type: object
      required: [label, targetLabel, rawLabel]
      properties:
        label: { type: string, example: 最新 INR }
        targetLabel: { type: string, example: 目标 1.8–2.5 }
        rawLabel: { type: string, example: 校准前 }
    NextTestDisplayText:
      type: object
      required: [label, cycleText]
      properties:
        label: { type: string, example: 下次检测 }
        cycleText: { type: string, example: 每 2 周 }
    TodayMedicationDisplayText:
      type: object
      required: [title, primaryAction, pauseAction, missAction, yesterdayDoseText, statusText, tomorrowDoseTitle, plannedDoseLabel, manualDoseLabel, recordedAtHint, confirmAction]
      properties:
        title: { type: string, example: 今日服药 }
        primaryAction: { type: string, example: 完成服药 }
        pauseAction: { type: string, example: 停服 }
        missAction: { type: string, example: 漏服 }
        yesterdayDoseText: { type: string, example: 昨日服药量：1.5 片 }
        statusText: { type: string, example: 状态：待完成 }
        tomorrowDoseTitle: { type: string, example: 选择明日剂量 }
        plannedDoseLabel: { type: string, example: 按计划服用 }
        manualDoseLabel: { type: string, example: 手动输入 }
        recordedAtHint: { type: string, example: 系统记录当前操作时间作为服药时间 }
        confirmAction: { type: string, example: 确认明日剂量 }
    INRRecordDisplayText:
      type: object
      required: [statusLabel, note, rawLabel, methodLabel]
      properties:
        statusLabel: { type: string, example: 正常 }
        note: { type: string, example: 处于目标范围，继续按周期记录与复测。 }
        rawLabel: { type: string, example: 校准前 }
        methodLabel: { type: string, example: 家用指尖血 INR 仪 }
    INRRecordsDisplayText:
      type: object
      required: [locale, trend, recordLabels, recordsTitle, recordsHint]
      properties:
        locale:
          type: string
          example: zh-CN
        trend:
          $ref: '#/components/schemas/INRTrendDisplayText'
        recordLabels:
          $ref: '#/components/schemas/INRRecordLabelsDisplayText'
        recordsTitle: { type: string, example: INR 检测记录 }
        recordsHint: { type: string, example: 校准后为主，校准前作为参考 }
    INRTrendDisplayText:
      type: object
      required: [title, subtitle, correctedSeriesLabel, rawSeriesLabel, strongLabel, weakLabel]
      properties:
        title: { type: string, example: INR 趋势 }
        subtitle: { type: string, example: 校准后 / 校准前 }
        correctedSeriesLabel: { type: string, example: 校准后 }
        rawSeriesLabel: { type: string, example: 校准前 }
        strongLabel: { type: string, example: 强异常 }
        weakLabel: { type: string, example: 弱提示 }
    INRRecordLabelsDisplayText:
      type: object
      required: [normal, weakLow, strongLow, weakHigh, strongHigh]
      properties:
        normal: { type: string, example: 正常 }
        weakLow: { type: string, example: 弱提示 }
        strongLow: { type: string, example: 强提示 }
        weakHigh: { type: string, example: 弱提示 }
        strongHigh: { type: string, example: 强提示 }
    TestCycle:
      type: object
      required: [unit, interval]
      properties:
        unit:
          type: string
          enum: [day, week, month]
        interval:
          type: integer
          minimum: 1
    UpdateUserSettingsRequest:
      type: object
      required: [targetInrMin, targetInrMax, defaultMedicationTime, testCycle, testMethods, inrOffset]
      properties:
        targetInrMin:
          type: number
          example: 1.8
        targetInrMax:
          type: number
          example: 2.5
        defaultMedicationTime:
          type: string
          example: '08:00'
        testCycle:
          $ref: '#/components/schemas/TestCycle'
        testMethods:
          type: array
          minItems: 1
          items:
            type: string
            enum: [hospital_lab, poct_device, home_device, other]
        inrOffset:
          type: number
          example: 0.0
    UserSettings:
      type: object
      required: [targetInrMin, targetInrMax, defaultMedicationTime, testCycle, testMethods, inrOffset, displayText]
      properties:
        targetInrMin:
          type: number
          example: 1.8
        targetInrMax:
          type: number
          example: 2.5
        defaultMedicationTime:
          type: string
          example: '08:00'
        testCycle:
          $ref: '#/components/schemas/TestCycle'
        testMethods:
          type: array
          minItems: 1
          items:
            type: string
            enum: [hospital_lab, poct_device, home_device, other]
        inrOffset:
          type: number
          example: 0.0
        displayText:
          $ref: '#/components/schemas/SettingsDisplayText'
    SettingsDisplayText:
      type: object
      description: 设置页业务文案，由服务端返回以支持后续多语言。
      required: [locale, inrRangeTitle, inrRangeHint, testMethodTitle, testMethodHint, offsetTitle, offsetHint, cycleTitle, cycleHint, medicationTimeTitle, saveAction]
      properties:
        locale:
          type: string
          example: zh-CN
        inrRangeTitle:
          type: string
          example: 目标 INR 范围
        inrRangeHint:
          type: string
          example: 当前目标 1.8–2.5，异常提示按 ±0.1 分层
        testMethodTitle:
          type: string
          example: 检测方式
        testMethodHint:
          type: string
          example: 可选择医院静脉血、POCT 或家用指尖血设备
        offsetTitle:
          type: string
          example: 检测偏移量
        offsetHint:
          type: string
          example: 全站优先显示校准后 INR，校准前数值弱展示
        cycleTitle:
          type: string
          example: 检测周期
        cycleHint:
          type: string
          example: 每 1 月
        medicationTimeTitle:
          type: string
          example: 默认服药时间
        saveAction:
          type: string
          example: 保存设置
